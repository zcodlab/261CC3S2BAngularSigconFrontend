<div class="app-container">
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
      <div class="container-fluid">
        <a class="navbar-brand" routerLink="/">
          <img src="assets/imagenes/operaciones/sigcon-brand-logo.svg" alt="SIGCON Logo" class="brand-logo" height="60">
        </a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Inicio</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" routerLink="/servicios" routerLinkActive="active">Nuestro Servicios</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" routerLink="/cotizar" routerLinkActive="active">Cotizar</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" routerLink="/contact" routerLinkActive="active">Contactanos</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" (click)="logout()" style="cursor: pointer;">Iniciar Sesion</a>
            </li>
            <ng-template #loginLink>
              <li class="nav-item">
                <a class="nav-link" routerLink="/login" routerLinkActive="active">Cerrar Sesion</a>
              </li>
            </ng-template>
          </ul>
        </div>
      </div>
    </nav>
  </header>
  <main>
    <router-outlet></router-outlet>
  </main>
</div>
